<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#2C343B" />
        <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16.png" />
        <link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
        <link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/icon-512.png" />
        <title>Tangible</title>
        <script>
            // Pre-hydration theme bootstrap — mirrors theme.ts resolveDataTheme() to avoid FOUC.
            // Reads: tangible:theme-mode ('light'|'dark'|'system')
            //        tangible:theme-palette (palette id, default 'granite')
            // All palettes support both light and dark — data-theme is always '<palette>-<mode>'.
            (function () {
                try {
                    var mode = localStorage.getItem('tangible:theme-mode') || 'system';
                    var pal  = localStorage.getItem('tangible:theme-palette') || 'granite';
                    var dark = mode === 'dark' || (mode !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
                    document.documentElement.dataset.theme = pal + (dark ? '-dark' : '-light');
                } catch (_) {
                    document.documentElement.dataset.theme = 'granite-dark';
                }
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
