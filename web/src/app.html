<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0f172a" />
        <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
        <link rel="alternate icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/icon-512.png" />
        <title>Tangible</title>
        <script>
            // Pre-hydration theme bootstrap (no FOUC).
            (function () {
                try {
                    var m = localStorage.getItem('tangible:theme') || 'system';
                    var resolved =
                        m === 'light' || m === 'dark'
                            ? m
                            : matchMedia('(prefers-color-scheme: dark)').matches
                              ? 'dark'
                              : 'light';
                    document.documentElement.dataset.theme = resolved;
                    var meta = document.querySelector('meta[name="theme-color"]');
                    if (meta)
                        meta.setAttribute('content', resolved === 'dark' ? '#0f172a' : '#f8fafc');
                } catch (_) {
                    document.documentElement.dataset.theme = 'dark';
                }
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
