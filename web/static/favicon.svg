<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tangible favicon — round-brilliant gem only on transparent ground for
  browser tabs. Wider table + crown facets so the silhouette reads as
  a faceted jewel even at 16px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tangible">
    <title>Tangible</title>
    <!-- Pavilion -->
    <path d="M 5 11 L 9 15 L 16 27 Z"   fill="#0284c7"/>
    <path d="M 9 15 L 23 15 L 16 27 Z" fill="#0369a1"/>
    <path d="M 23 15 L 27 11 L 16 27 Z" fill="#0284c7"/>
    <!-- Girdle -->
    <path d="M 5 11 L 7 7 L 9 15 Z"   fill="#38bdf8"/>
    <path d="M 27 11 L 25 7 L 23 15 Z" fill="#38bdf8"/>
    <!-- Crown sides -->
    <path d="M 7 7 L 11 4 L 9 15 Z"   fill="#7dd3fc"/>
    <path d="M 25 7 L 21 4 L 23 15 Z" fill="#7dd3fc"/>
    <!-- Crown table -->
    <path d="M 11 4 L 21 4 L 23 15 L 9 15 Z" fill="#bae6fd"/>
    <!-- Outline -->
    <path d="M 11 4 L 21 4 L 25 7 L 27 11 L 23 15 L 16 27 L 9 15 L 5 11 L 7 7 Z
             M 9 15 L 23 15"
          fill="none" stroke="#0f172a" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
