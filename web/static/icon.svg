<?xml version="1.0" encoding="UTF-8"?>
<!--
  Covet brand mark — flat / Material style.
  Open treasure chest in two solid slate tones with a single brass
  band, plus a round-brilliant gem (favicon construction, scaled 13×)
  floating above. No gradients, no specular highlights, no double
  strokes. Palette matches web/src/lib/styles.css.

  Layout (1024×1024 viewBox):
    Gem        y  80 → 379  (culet)
    Gap            ~80 px
    Chest lid  y 460 → 620
    Chest body y 620 → 920
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Covet">
    <title>Covet</title>

    <!-- Tile background -->
    <rect width="1024" height="1024" rx="192" fill="#0f172a"/>

    <!-- ============ GEM (favicon construction × 13, centered at x=512) ============
         Vertices (clockwise from top-left of the table):
           crown table:    T1 447, 80   T2 577, 80
           crown corners:  C1 395,119   C2 629,119
           girdle:         G1 369,171   G2 655,171
           pavilion mid:   P1 421,223   P2 603,223
           culet:          K  512,379                                            -->
    <!-- Pavilion (lower half) — three facets meeting at the culet -->
    <path d="M 369 171 L 421 223 L 512 379 Z" fill="#0284c7"/>
    <path d="M 421 223 L 603 223 L 512 379 Z" fill="#0369a1"/>
    <path d="M 603 223 L 655 171 L 512 379 Z" fill="#0284c7"/>
    <!-- Girdle slivers -->
    <path d="M 369 171 L 395 119 L 421 223 Z" fill="#38bdf8"/>
    <path d="M 655 171 L 629 119 L 603 223 Z" fill="#38bdf8"/>
    <!-- Crown side facets -->
    <path d="M 395 119 L 447  80 L 421 223 Z" fill="#7dd3fc"/>
    <path d="M 629 119 L 577  80 L 603 223 Z" fill="#7dd3fc"/>
    <!-- Crown table (large central top facet) -->
    <path d="M 447  80 L 577  80 L 603 223 L 421 223 Z" fill="#bae6fd"/>

    <!-- ============ CHEST (flat) ============ -->
    <!-- Body: rounded rectangle in slate-700 -->
    <rect x="160" y="620" width="704" height="300" rx="48" fill="#1e293b"/>
    <!-- Open lid: domed cap in slate-600 (one shade lighter than the body) -->
    <path d="M 160 620
             Q 160 460 512 460
             Q 864 460 864 620 Z"
          fill="#334155"/>
    <!-- Single horizontal brass band across the body -->
    <rect x="160" y="772" width="704" height="36" fill="#f59e0b"/>
    <!-- Clasp: single rounded rect straddling the lid/body seam -->
    <rect x="472" y="580" width="80" height="96" rx="14" fill="#f59e0b"/>
</svg>
