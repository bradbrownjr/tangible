name: Android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Lint, test, build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper jar (one-time bootstrap)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL -o /tmp/g.zip https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
            unzip -q -d /tmp/g /tmp/g.zip
            cp /tmp/g/gradle-8.10.2/lib/plugins/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
            /tmp/g/gradle-8.10.2/bin/gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi

      - name: Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload lint reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
            android/app/build/intermediates/lint_intermediate_text_report/**/*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Unit tests
        run: |
          set -o pipefail
          ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee unit-tests.log

      - name: Upload unit test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            android/unit-tests.log
            android/app/build/reports/**
            android/app/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename debug APK
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/covet-${VERSION}-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: covet-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Assemble release APK (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            ./gradlew :app:assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/release.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon
          else
            echo "No release keystore configured — skipping signed build"
          fi

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Wait up to 60s for release.yml to create the release first.
          for i in $(seq 1 12); do
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 && break
            echo "Waiting for release $TAG to exist... ($i/12)"
            sleep 5
          done
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            app/build/outputs/apk/debug/*.apk \
            $(ls app/build/outputs/apk/release/*.apk 2>/dev/null || true)

      - name: Attach debug APK to GitHub Release (fallback if unsigned)
        # Always attach the debug APK to the release so users have an
        # installable build even when no production keystore is wired up.
        # Rename it to make the signing status obvious.
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          mkdir -p apk-out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "apk-out/covet-${VERSION}-debug.apk"

      - name: Upload debug APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apk-out/covet-*-debug.apk
