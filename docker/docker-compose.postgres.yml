# Postgres overlay for Tangible.
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.standard.yml \
#     -f docker/docker-compose.postgres.yml up -d
#
# This adds a Postgres service and points Tangible at it. The SQLite volume is
# still defined by the base file but goes unused; you can remove it from the
# base file if you want a strictly-Postgres deployment.

services:
  tangible:
    depends_on:
      db:
        condition: service_healthy
    environment:
      TANGIBLE_DATABASE_URL: postgresql+psycopg://tangible:${POSTGRES_PASSWORD:-tangible}@db:5432/tangible

  db:
    image: postgres:16-alpine
    container_name: tangible-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tangible
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tangible}
      POSTGRES_DB: tangible
    volumes:
      - tangible-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tangible -d tangible"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tangible-pg:
