# Unraid-friendly Docker Compose for Covet.
#
# Pre-create:
#   /mnt/user/appdata/covet/data
#   /mnt/user/appdata/covet/config
#
# Usage (from any working dir):
#   docker compose -f docker-compose.unraid.yml up -d
#
# This file uses absolute host paths; copy and edit as needed.

services:
  covet:
    image: ${COVET_IMAGE:-ghcr.io/bradbrownjr/covet:edge}
    container_name: covet
    restart: unless-stopped
    # Unraid Docker tab labels. [IP] resolves to the host's LAN IP and
    # [PORT:8000] resolves to whichever host port you mapped to 8000
    # below, so the Web UI link works whether you reverse-proxy or not.
    # Drop in any HTTPS image URL for `icon` to set a custom tile icon.
    labels:
      net.unraid.docker.webui: "http://[IP]:[PORT:8000]/"
      net.unraid.docker.shell: "bash"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/bradbrownjr/covet/main/web/static/icon-512.png"
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-Etc/UTC}
      # Unraid 'nobody:users' = 99:100
      PUID: 99
      PGID: 100
      UMASK: "0022"
      COVET_PUBLIC_URL: ${COVET_PUBLIC_URL:-https://covet.example.com}
      COVET_BEHIND_PROXY: "true"
      COVET_ALLOWED_HOSTS: ${COVET_ALLOWED_HOSTS:-covet.example.com}
      COVET_REGISTRATION_ENABLED: "false"
      # Optional: bootstrap an admin from env on first launch.
      # If you leave both unset, simply browse to ${COVET_PUBLIC_URL} after
      # the container is healthy and click 'Register' — the very first user
      # to sign up is automatically promoted to admin (regardless of the
      # COVET_REGISTRATION_ENABLED setting). Set these only if you want a
      # specific admin username/password baked into the deployment.
      # COVET_ADMIN_USERNAME: admin
      # COVET_ADMIN_PASSWORD_FILE: /run/secrets/covet_admin_password
    volumes:
      - /mnt/user/appdata/covet/data:/data
      - /mnt/user/appdata/covet/config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${COVET_NETWORK:-proxy}
